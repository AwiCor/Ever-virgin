<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lux Rosarii — Prayer</title>
  <meta name="description" content="Lead the Holy Rosary one prayer at a time." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="prayer-page">

  <a href="index.html" class="exit-link" aria-label="Exit prayer">✕ Exit</a>

  <!-- The center stage where each prayer is rendered -->
  <main class="stage" id="stage">
    <!-- Renderer fills this in -->
  </main>

  <!-- Small visual rosary in bottom-left corner -->
  <div class="rosary-corner" aria-hidden="true">
    <svg viewBox="0 0 180 220" xmlns="http://www.w3.org/2000/svg">
      <!-- Cord: faint outline of the loop -->
      <circle cx="90" cy="75" r="55" class="connector" />

      <!-- Cord: vertical line for the tail -->
      <line x1="90" y1="130" x2="90" y2="195" class="connector" />

      <!-- ============== TAIL (top to bottom) =============== -->

      <!-- Medallion (centerpiece between loop and tail) -->
      <ellipse id="bead-medallion" class="medallion"
               cx="90" cy="135" rx="6.5" ry="5.5" />

      <!-- Three Hail Mary beads (small) -->
      <circle id="bead-creed-4" class="bead" cx="90" cy="148" r="2.8" />
      <circle id="bead-creed-3" class="bead" cx="90" cy="158" r="2.8" />
      <circle id="bead-creed-2" class="bead" cx="90" cy="168" r="2.8" />

      <!-- Our Father bead (large) -->
      <circle id="bead-creed-1" class="bead" cx="90" cy="180" r="4.6" />

      <!-- Crucifix (group: it's the "bead-cross") -->
      <g id="bead-cross" class="cross-shape">
        <!-- vertical bar -->
        <line x1="90" y1="192" x2="90" y2="214" />
        <!-- horizontal bar -->
        <line x1="82" y1="200" x2="98" y2="200" />
      </g>

      <!-- ============== LOOP BEADS (generated by inline script) =============== -->
      <g id="loop-beads"></g>

      <!-- Invisible larger click targets on top of the decade Our-Father beads.
           These let the user jump directly to a specific decade by clicking the
           rosary diagram. Generated alongside the loop beads. -->
      <g id="loop-bead-targets"></g>
    </svg>
  </div>

  <!-- Thin gold progress line along the very bottom -->
  <div class="progress-bar" aria-hidden="true">
    <div class="progress-bar-fill" id="progress-bar-fill"></div>
  </div>

  <p class="kb-hint">
    SPACE&nbsp;·&nbsp;←→&nbsp;·&nbsp;F fullscreen&nbsp;·&nbsp;+/−&nbsp;text&nbsp;·&nbsp;[&nbsp;]&nbsp;image&nbsp;·&nbsp;0 reset&nbsp;·&nbsp;ESC exit
  </p>

  <!-- Build the 55 loop beads BEFORE app.js runs, so bead lighting can find them. -->
  <script>
    (function buildLoopBeads() {
      const cx = 90, cy = 75, R = 55;
      const SLOTS = 56;            // 55 beads + 1 medallion slot at the bottom
      const SVG_NS = "http://www.w3.org/2000/svg";
      const g = document.getElementById("loop-beads");
      const targets = document.getElementById("loop-bead-targets");

      for (let i = 1; i <= 55; i++) {
        const indexInDecade = (i - 1) % 11;        // 0 = OF bead, 1..10 = HM
        const decade = Math.floor((i - 1) / 11) + 1;
        const isOF = indexInDecade === 0;
        const id = isOF
          ? "bead-d" + decade + "-of"
          : "bead-d" + decade + "-hm-" + indexInDecade;

        // Walk counterclockwise (in user view) starting from just-past-medallion.
        const angleDeg = 90 - i * (360 / SLOTS);
        const rad = angleDeg * Math.PI / 180;
        const x = cx + R * Math.cos(rad);
        const y = cy + R * Math.sin(rad);
        const r = isOF ? 5.0 : 2.8;   // OF slightly larger so they're easier to click

        const c = document.createElementNS(SVG_NS, "circle");
        c.setAttribute("cx", x.toFixed(2));
        c.setAttribute("cy", y.toFixed(2));
        c.setAttribute("r", r);
        c.setAttribute("id", id);
        c.setAttribute("class", "bead");
        g.appendChild(c);

        // Add an invisible larger click target over each Our-Father bead so
        // users can click a decade in the rosary to jump there.
        if (isOF) {
          const t = document.createElementNS(SVG_NS, "circle");
          t.setAttribute("cx", x.toFixed(2));
          t.setAttribute("cy", y.toFixed(2));
          t.setAttribute("r", 11);
          t.setAttribute("class", "bead-target");
          t.dataset.jumpDecade = String(decade);
          targets.appendChild(t);
        }
      }
    })();
  </script>

  <script src="app.js"></script>
</body>
</html>
