<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lux Rosarii — Prayer</title>
  <meta name="description" content="Lead the Holy Rosary one prayer at a time." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="prayer-page">

  <a href="index.html" class="exit-link" aria-label="Exit prayer">✕ Exit</a>

  <!-- Settings button (top-left) — opens a panel with text/image size,
       auto-advance toggle + speed, and other per-user preferences. -->
  <button class="settings-btn" id="settings-btn"
          type="button" aria-label="Open settings"
          aria-expanded="false" aria-controls="settings-panel">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path fill="currentColor" d="M19.43 12.98c.04-.32.07-.65.07-.98 0-.33-.03-.66-.07-.98l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.61-.22l-2.49 1a7.05 7.05 0 0 0-1.7-.98l-.38-2.65A.49.49 0 0 0 14 2h-4a.49.49 0 0 0-.49.42l-.38 2.65c-.61.25-1.18.58-1.7.98l-2.49-1a.5.5 0 0 0-.61.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65c-.04.32-.07.65-.07.98 0 .33.03.66.07.98l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46a.5.5 0 0 0 .61.22l2.49-1c.52.4 1.09.73 1.7.98l.38 2.65c.05.24.25.42.49.42h4c.24 0 .44-.18.49-.42l.38-2.65c.61-.25 1.18-.58 1.7-.98l2.49 1a.5.5 0 0 0 .61-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.65zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/>
    </svg>
  </button>

  <!-- Settings panel — hidden by default, opened by the gear button. -->
  <div class="settings-overlay" id="settings-overlay" hidden></div>
  <aside class="settings-panel" id="settings-panel" hidden
         role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <header class="settings-header">
      <h2 id="settings-title">Settings</h2>
      <button class="settings-close" id="settings-close"
              type="button" aria-label="Close settings">✕</button>
    </header>

    <section class="settings-section">
      <h3>Display</h3>

      <div class="settings-row">
        <label for="settings-font">Text size</label>
        <div class="settings-stepper">
          <button type="button" data-action="font-down" aria-label="Smaller text">−</button>
          <span class="settings-value" id="settings-font-value">100%</span>
          <button type="button" data-action="font-up" aria-label="Larger text">+</button>
        </div>
      </div>

      <div class="settings-row">
        <label for="settings-image">Painting size</label>
        <div class="settings-stepper">
          <button type="button" data-action="image-down" aria-label="Smaller painting">−</button>
          <span class="settings-value" id="settings-image-value">100%</span>
          <button type="button" data-action="image-up" aria-label="Larger painting">+</button>
        </div>
      </div>

      <div class="settings-row">
        <button class="settings-reset" type="button" data-action="reset-display">
          Reset display
        </button>
      </div>
    </section>

    <section class="settings-section">
      <h3>Pace</h3>

      <div class="settings-row">
        <label>Auto-advance</label>
        <div class="settings-toggle">
          <button type="button" id="settings-auto-toggle"
                  class="settings-toggle-btn" aria-pressed="false">
            <span class="settings-toggle-track"><span class="settings-toggle-thumb"></span></span>
            <span class="settings-toggle-label">Off</span>
          </button>
        </div>
      </div>

      <div class="settings-row settings-row-speed">
        <label>Speed</label>
        <div class="settings-segmented" role="radiogroup" aria-label="Auto-advance speed">
          <button type="button" role="radio" data-speed="slow"   aria-checked="false">Slow</button>
          <button type="button" role="radio" data-speed="normal" aria-checked="true">Normal</button>
          <button type="button" role="radio" data-speed="fast"   aria-checked="false">Fast</button>
        </div>
      </div>

      <p class="settings-hint">
        With auto-advance on, the prayer moves forward at a calm leading pace.
        Click anywhere or press space to step ahead manually at any time.
      </p>
    </section>
  </aside>

  <!-- The center stage where each prayer is rendered -->
  <main class="stage" id="stage">
    <!-- Renderer fills this in -->
  </main>

  <!-- Mini rosary widget — interactive map of where we are in the prayer.
       Click the cross to jump to the Apostles' Creed; click the medallion
       to jump to the Hail Holy Queen; click any of the five Our-Father
       beads (the larger gold-tinted ones) to jump to that decade. -->
  <div class="rosary-corner" aria-hidden="true">
    <svg viewBox="0 0 180 220" xmlns="http://www.w3.org/2000/svg">
      <!-- Cord: faint outline of the loop. -->
      <circle cx="90" cy="70" r="55" class="connector" />
      <!-- Short chain piece between the loop and the medallion. -->
      <line x1="90" y1="125" x2="90" y2="128" class="connector" />
      <!-- Tail cord from medallion bottom to top of cross. -->
      <line x1="90" y1="138" x2="90" y2="190.8" class="connector" />

      <!-- Medallion: rectangular centerpiece (golden ratio 16:10) with a
           tiny etched cross. Subtle drop shadow gives it dimensionality. -->
      <rect id="bead-medallion" class="medallion"
            x="82" y="128" width="16" height="10" rx="1.8" />
      <g class="medallion-detail" aria-hidden="true">
        <line x1="90" y1="130.5" x2="90" y2="135.5" />
        <line x1="87.4" y1="133" x2="92.6" y2="133" />
      </g>

      <!-- Tail beads: 2 large Our-Father beads + 3 small Hail-Mary beads.
           OF radius 3.0, HM radius 1.8 — ratio ≈ φ (golden). Uniform 5-unit
           edge-to-edge spacing throughout. -->
      <circle id="bead-d1-of"   class="bead bead-of" cx="90" cy="146.0" r="3.0" />
      <circle id="bead-creed-4" class="bead"          cx="90" cy="155.8" r="1.8" />
      <circle id="bead-creed-3" class="bead"          cx="90" cy="164.4" r="1.8" />
      <circle id="bead-creed-2" class="bead"          cx="90" cy="173.0" r="1.8" />
      <circle id="bead-creed-1" class="bead bead-of" cx="90" cy="182.8" r="3.0" />

      <!-- Latin crucifix (18:11 golden vertical:horizontal ratio). -->
      <g id="bead-cross" class="cross-shape">
        <line x1="90" y1="190.8" x2="90" y2="208.8" />
        <line x1="84.5" y1="196.8" x2="95.5" y2="196.8" />
      </g>

      <!-- Click targets. -->
      <rect class="bead-target" data-jump-special="medallion"
            x="76" y="123" width="28" height="20" />
      <rect class="bead-target" data-jump-special="cross"
            x="80" y="187" width="20" height="26" />
      <circle class="bead-target" data-jump-decade="1"
              cx="90" cy="146" r="8" />

      <!-- Loop beads + their click targets are generated by the inline
           script below (decades 2-5 only — decade 1's OF lives on the tail). -->
      <g id="loop-beads"></g>
      <g id="loop-bead-targets"></g>
    </svg>
  </div>


  <!-- Thin gold progress line along the very bottom -->
  <div class="progress-bar" aria-hidden="true">
    <div class="progress-bar-fill" id="progress-bar-fill"></div>
  </div>

  <p class="kb-hint" id="kb-hint">
    SPACE&nbsp;·&nbsp;←→&nbsp;·&nbsp;⇧←→ decade&nbsp;·&nbsp;F fullscreen&nbsp;·&nbsp;+/−&nbsp;text&nbsp;·&nbsp;[&nbsp;]&nbsp;image&nbsp;·&nbsp;0 reset&nbsp;·&nbsp;ESC exit
  </p>

  <!-- Toggle for the keyboard legend. The legend auto-hides once the user
       advances past the introductory Our Father; this button brings it back. -->
  <button class="kb-hint-toggle" id="kb-hint-toggle"
          type="button" aria-label="Show keyboard legend">‹</button>

  <!-- Generate the 54 loop beads (50 HMs + 4 OFs for decades 2-5) BEFORE
       app.js so its bead-lighting code can find them by ID. -->
  <script>
    (function buildLoopBeads() {
      const g = document.getElementById("loop-beads");
      if (!g) return;
      const cx = 90, cy = 70, R = 55;
      const targets = document.getElementById("loop-bead-targets");
      const SVG_NS = "http://www.w3.org/2000/svg";
      // 54 beads cover the full 360° loop: 4 OFs (decades 2-5) interspersed
      // with 50 HMs (10 per decade). Decade 1's OF lives on the tail.
      const TOTAL = 54;
      const STEP = 360 / TOTAL;
      const FIRST_ANGLE = 90 - STEP / 2;   // first HM just right of straight-down
      const R_OF = 3.0, R_HM = 1.8;

      function classify(i) {
        if (i === 11) return { id: "bead-d2-of", isOF: true, decade: 2 };
        if (i === 22) return { id: "bead-d3-of", isOF: true, decade: 3 };
        if (i === 33) return { id: "bead-d4-of", isOF: true, decade: 4 };
        if (i === 44) return { id: "bead-d5-of", isOF: true, decade: 5 };
        let dec, hm;
        if (i <= 10)      { dec = 1; hm = i; }
        else if (i <= 21) { dec = 2; hm = i - 11; }
        else if (i <= 32) { dec = 3; hm = i - 22; }
        else if (i <= 43) { dec = 4; hm = i - 33; }
        else              { dec = 5; hm = i - 44; }
        return { id: "bead-d" + dec + "-hm-" + hm, isOF: false };
      }

      for (let i = 1; i <= TOTAL; i++) {
        const info = classify(i);
        const angleDeg = FIRST_ANGLE - (i - 1) * STEP;
        const rad = angleDeg * Math.PI / 180;
        const x = cx + R * Math.cos(rad);
        const y = cy + R * Math.sin(rad);
        const c = document.createElementNS(SVG_NS, "circle");
        c.setAttribute("cx", x.toFixed(2));
        c.setAttribute("cy", y.toFixed(2));
        c.setAttribute("r", info.isOF ? R_OF : R_HM);
        c.setAttribute("id", info.id);
        c.setAttribute("class", info.isOF ? "bead bead-of" : "bead");
        g.appendChild(c);
        if (info.isOF) {
          const t = document.createElementNS(SVG_NS, "circle");
          t.setAttribute("cx", x.toFixed(2));
          t.setAttribute("cy", y.toFixed(2));
          t.setAttribute("r", 9);
          t.setAttribute("class", "bead-target");
          t.dataset.jumpDecade = String(info.decade);
          targets.appendChild(t);
        }
      }
    })();
  </script>

  <script src="app.js?v=20"></script>
</body>
</html>
